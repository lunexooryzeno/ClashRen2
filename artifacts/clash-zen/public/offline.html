<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clash Ren — No Connection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #000;
      font-family: 'Rajdhani', 'Inter', system-ui, sans-serif;
      color: #fff;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
      text-align: center;
    }
    .icon-ring {
      width: 80px; height: 80px;
      border-radius: 24px;
      background: rgba(255,60,0,0.12);
      border: 1.5px solid rgba(255,60,0,0.3);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(255,60,0,0.15);
    }
    .icon-ring svg { width: 36px; height: 36px; color: #ff3c00; }
    h1 {
      font-size: 22px; font-weight: 700; letter-spacing: 0.06em;
      color: #fff; text-transform: uppercase;
    }
    p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 8px;
      padding: 14px 32px;
      border-radius: 14px;
      background: #ff3c00;
      border: none; cursor: pointer;
      color: #fff; font-size: 15px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      box-shadow: 0 0 20px rgba(255,60,0,0.35);
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="icon-ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>
  <div>
    <h1>No Connection</h1>
    <p>Reconnect to continue matchmaking. Your cached data is still available.</p>
  </div>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
